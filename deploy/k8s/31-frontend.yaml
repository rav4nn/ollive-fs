apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ollive
  labels: { app: frontend }
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: ollive/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          # Next.js doesn't expose a real health endpoint; HEAD / suffices.
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: "20m",  memory: "96Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ollive
spec:
  type: NodePort
  selector: { app: frontend }
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
