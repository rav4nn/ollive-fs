apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: ollive
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ollive
  labels: { app: redis }
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { cpu: "20m",  memory: "32Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ollive
spec:
  selector: { app: redis }
  ports:
    - port: 6379
      targetPort: 6379
