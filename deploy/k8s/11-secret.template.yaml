# Template. Don't commit a copy with real values to public source control.
# Apply with: kubectl apply -f 11-secret.yaml  (after filling values)
apiVersion: v1
kind: Secret
metadata:
  name: ollive-secret
  namespace: ollive
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME"

  # Full async DATABASE_URL — the password component must match POSTGRES_PASSWORD above.
  DATABASE_URL: "postgresql+asyncpg://ollive:CHANGE_ME@postgres:5432/ollive"

  # API keys: leave the ones you're not using empty.
  ANTHROPIC_API_KEY: ""
  DEEPSEEK_API_KEY: "sk-..."
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
